<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Video Exercise</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        video {
            max-width: 80%;
            height: auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
<main>
<video

     src="getsuga jujisho.mp4" type="video/mp4" height="300" width="800"
     controls 
     loop 
     poster="getsuga jujishou.jpg" height="300" width="800"
       
        Your browser does not support the video tag.

    </video> 

</main>
    
    
    

</body>
</html>
